<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whoops! You're Offline.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        .float {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .cable-line {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawLine 2s ease forwards;
        }

        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-slate-800 overflow-hidden">

    <main class="max-w-md w-full bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl p-8 text-center border border-white/50 relative z-10">
        
        <!-- Playful SVG Graphic -->
        <div class="relative w-48 h-48 mx-auto mb-6 float">
            <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full drop-shadow-lg">
                <!-- Broken Cable Left -->
                <path d="M20 100 Q 50 120 70 90" stroke="#CBD5E1" stroke-width="12" stroke-linecap="round" fill="none" class="cable-line" />
                <path d="M70 75 L70 105" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" />
                
                <!-- Broken Cable Right (The Plug) -->
                <path d="M180 100 Q 150 80 130 110" stroke="#CBD5E1" stroke-width="12" stroke-linecap="round" fill="none" class="cable-line" />
                
                <!-- Plug Base -->
                <rect x="105" y="85" width="30" height="50" rx="8" fill="#475569" />
                <!-- Prongs -->
                <line x1="90" y1="100" x2="105" y2="100" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" />
                <line x1="90" y1="120" x2="105" y2="120" stroke="#94A3B8" stroke-width="6" stroke-linecap="round" />
                
                <!-- Cute Face on Plug -->
                <circle cx="115" cy="105" r="3" fill="white" />
                <circle cx="125" cy="105" r="3" fill="white" />
                <path d="M115 115 Q 120 120 125 115" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" />
            </svg>
        </div>

        <h1 class="text-3xl font-black mb-3 text-slate-800 tracking-tight">
            Oh no! You're offline.
        </h1>
        
        <p class="text-slate-500 mb-8 leading-relaxed">
            It looks like your internet connection decided to take a little nap. 
            Don't worry, we'll be right here when it wakes up.
        </p>

        <button id="retry-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-2xl transition-all duration-200 transform hover:scale-[1.02] active:scale-95 shadow-lg hover:shadow-indigo-500/30 flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
            </svg>
            Try Reconnecting
        </button>

        <div id="status-message" class="mt-5 text-sm font-bold h-6 opacity-0 transition-opacity duration-300">
            <!-- Dynamic messages will appear here -->
        </div>
    </main>

    <!-- Background decorative elements -->
    <div class="fixed top-20 left-20 w-32 h-32 bg-indigo-200 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-pulse"></div>
    <div class="fixed bottom-20 right-20 w-48 h-48 bg-pink-200 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-pulse" style="animation-delay: 2s;"></div>

    <script>
        const retryBtn = document.getElementById('retry-btn');
        const statusMsg = document.getElementById('status-message');
        const pageContainer = document.querySelector('main');

        // Funny messages to cycle through if they keep clicking while offline
        const offlineMessages = [
            "Nope, still taking a nap. 💤",
            "Houston, we still have a problem. 🚀",
            "Did you try turning it off and on again? 🔌",
            "Still lost in the digital void! 🌌",
            "Waiting for a carrier pigeon... 🕊️",
            "Wi-Fi is playing hide and seek. 🙈"
        ];
        
        let clickCount = 0;

        function showMessage(text, isSuccess) {
            statusMsg.textContent = text;
            statusMsg.style.opacity = '1';
            
            if (isSuccess) {
                statusMsg.className = "mt-5 text-sm font-bold h-6 transition-opacity duration-300 text-emerald-500";
            } else {
                statusMsg.className = "mt-5 text-sm font-bold h-6 transition-opacity duration-300 text-rose-500";
                
                // Trigger shake animation on the container
                pageContainer.classList.remove('shake');
                void pageContainer.offsetWidth; // Trigger reflow to restart animation
                pageContainer.classList.add('shake');
            }
        }

        // Check connection status when button is clicked
        retryBtn.addEventListener('click', () => {
            if (navigator.onLine) {
                showMessage("Yay! The internet is back! Redirecting...", true);
                retryBtn.classList.add('bg-emerald-500', 'hover:bg-emerald-600');
                retryBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    Connected!
                `;
                setTimeout(() => window.location.href = 'https://fish.checkers.page', 1500);
            } else {
                const randomMsg = offlineMessages[clickCount % offlineMessages.length];
                showMessage(randomMsg, false);
                clickCount++;
            }
        });

        // Automatically detect when the browser comes back online
        window.addEventListener('online', () => {
            showMessage("Look at that! You're back online. Redirecting...", true);
            retryBtn.classList.add('bg-emerald-500', 'hover:bg-emerald-600');
            setTimeout(() => window.location.href = 'https://fish.checkers.page', 2000);
        });
        
        // Just in case they somehow transition from online to offline while on this page
        window.addEventListener('offline', () => {
            showMessage("Aaaand it's gone again.", false);
        });
    </script>
</body>
</html>
